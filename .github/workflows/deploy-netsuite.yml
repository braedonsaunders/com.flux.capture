name: Deploy to NetSuite

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: 'Deploy mode'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - validate

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUITECLOUD_CI: "1"
      SUITECLOUD_CI_PASSKEY: ${{ secrets.NS_PASSKEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install SuiteCloud CLI
        run: npm install -g @oracle/suitecloud-cli --acceptsuitecloudsdklicense

      - name: Setup private key
        run: |
          echo "${{ secrets.NS_PRIVATE_KEY }}" | base64 -d > /tmp/private.pem
          chmod 600 /tmp/private.pem

      - name: Setup NetSuite authentication
        run: |
          suitecloud account:setup:ci \
            --account ${{ secrets.NS_ACCOUNT_ID }} \
            --authid "github-deploy" \
            --certificateid ${{ secrets.NS_CERTIFICATE_ID }} \
            --privatekeypath /tmp/private.pem

      - name: Validate project
        if: ${{ github.event.inputs.deploy_mode == 'validate' }}
        run: suitecloud project:validate

      - name: Deploy to NetSuite
        if: ${{ github.event.inputs.deploy_mode != 'validate' }}
        run: suitecloud project:deploy

      - name: Cleanup
        if: always()
        run: rm -f /tmp/private.pem

      - name: Deployment summary
        if: success()
        run: |
          echo "## Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "- **Account:** ${{ secrets.NS_ACCOUNT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** ${{ github.event.inputs.deploy_mode || 'deploy' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
