<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Capture</title>

    <!-- External dependencies -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- PDF.js for document rendering with annotations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configure PDF.js worker
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
    </script>

    <!-- App CSS - Placeholders replaced by Suitelet -->
    <link rel="stylesheet" href="{{CSS_BASE_URL}}">
    <link rel="stylesheet" href="{{CSS_COMPONENTS_URL}}">

    <!-- Critical inline CSS - ensures visibility if external CSS fails -->
    <style>
        /* Critical variables and base styles */
        :root {
            --color-primary: #2563eb;
            --color-primary-glow: rgba(37, 99, 235, 0.4);
            --surface-body: #f8fafc;
            --surface-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-inverse: #ffffff;
            --topbar-height: 56px;
            --border-color: #e2e8f0;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --radius-lg: 12px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--surface-body);
            color: var(--text-primary);
        }
        .app-wrapper { display: flex; flex-direction: column; min-height: 100vh; }

        /* Topbar - hidden until color resolved */
        .app-topbar {
            height: var(--topbar-height);
            background: linear-gradient(90deg, var(--gray-900), var(--gray-800));
            color: rgba(255,255,255,0.65);
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 var(--space-lg);
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .app-topbar.topbar-ready {
            opacity: 1;
            transform: translateY(0);
        }
        .app-main {
            flex: 1;
            margin-top: var(--topbar-height);
            min-height: calc(100vh - var(--topbar-height));
            display: flex;
            flex-direction: column;
        }
        #view-container {
            flex: 1;
            padding: 0;
            will-change: transform, opacity;
        }

        /* Exit animation - fade out and slide up */
        #view-container.view-exiting {
            animation: viewExit 0.25s cubic-bezier(0.4, 0, 0.6, 1) forwards;
        }

        /* Enter animation - fade in and slide up from below */
        #view-container.view-entering {
            opacity: 0;
            transform: translateY(12px);
        }

        #view-container.view-entered {
            animation: viewEnter 0.25s cubic-bezier(0, 0, 0.2, 1) forwards;
        }

        @keyframes viewExit {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-8px);
            }
        }

        @keyframes viewEnter {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .view-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-lg); }
        .view-header h1 { font-size: 28px; font-weight: 700; margin: 0; }
        .header-subtitle { color: var(--text-secondary); margin-top: 4px; }

        /* ==========================================
           PREMIUM LOADING SCREEN
           ========================================== */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
            position: relative;
        }

        /* Animated Logo Container */
        .loading-logo {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 32px;
        }

        /* Orbital Rings */
        .loading-ring {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: ring-spin 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }
        .loading-ring-2 {
            inset: 8px;
            border-top-color: rgba(37, 99, 235, 0.5);
            animation-duration: 2s;
            animation-direction: reverse;
        }
        .loading-ring-3 {
            inset: 16px;
            border-top-color: rgba(37, 99, 235, 0.3);
            animation-duration: 2.5s;
        }

        @keyframes ring-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Center Icon */
        .loading-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background: var(--color-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px var(--color-primary-glow), 0 0 80px var(--color-primary-glow);
            animation: icon-pulse 2s ease-in-out infinite;
        }
        .loading-icon svg {
            width: 28px;
            height: 28px;
            color: white;
        }

        @keyframes icon-pulse {
            0%, 100% {
                box-shadow: 0 0 40px var(--color-primary-glow), 0 0 80px var(--color-primary-glow);
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                box-shadow: 0 0 60px var(--color-primary-glow), 0 0 120px var(--color-primary-glow);
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        /* Brand Text with Letter Animation */
        .loading-brand {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 8px;
        }
        .loading-letter {
            font-size: 32px;
            font-weight: 800;
            color: white;
            opacity: 0;
            transform: translateY(20px);
            animation: letter-in 0.5s ease forwards;
            animation-delay: calc(var(--i) * 0.1s);
        }

        @keyframes letter-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tagline */
        .loading-tagline {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            opacity: 0;
            animation: fade-in 0.5s ease 0.6s forwards;
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }

        /* Progress Bar */
        .loading-progress {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 0 auto;
            overflow: hidden;
        }
        .loading-progress-bar {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, var(--color-primary), #60a5fa);
            border-radius: 3px;
            animation: progress-slide 1.5s ease-in-out infinite;
        }

        @keyframes progress-slide {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 60%; }
            100% { transform: translateX(400%); width: 30%; }
        }

        /* Ambient Particles */
        .loading-particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--color-primary);
            border-radius: 50%;
            opacity: 0;
            animation: particle-float 3s ease-in-out infinite;
        }
        .particle:nth-child(1) { left: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 40%; animation-delay: 0.5s; }
        .particle:nth-child(3) { left: 60%; animation-delay: 1s; }
        .particle:nth-child(4) { left: 80%; animation-delay: 1.5s; }

        @keyframes particle-float {
            0% { bottom: -10px; opacity: 0; transform: scale(0); }
            20% { opacity: 0.6; transform: scale(1); }
            80% { opacity: 0.6; }
            100% { bottom: 100%; opacity: 0; transform: scale(0); }
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 10px var(--space-md); font-size: 14px; font-weight: 500;
            border-radius: 8px; border: none; cursor: pointer;
        }
        .btn-primary { background: var(--color-primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .card {
            background: var(--surface-card); border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
        }
        .card-header {
            padding: var(--space-md) var(--space-lg);
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-title { font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .card-body { padding: var(--space-lg); }
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: var(--space-md); margin-bottom: var(--space-lg); }
        .kpi-card {
            background: var(--surface-card); border-radius: var(--radius-lg);
            padding: var(--space-lg); border: 1px solid var(--border-color);
            display: flex; align-items: flex-start; gap: var(--space-md);
        }
        .kpi-value { font-size: 28px; font-weight: 700; line-height: 1.2; }
        .kpi-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-lg); }
        .toast-container {
            position: fixed; bottom: var(--space-lg); right: var(--space-lg);
            z-index: 10001; display: flex; flex-direction: column; gap: 8px;
        }
    </style>

    <!-- NetSuite navbar color sync script - detects NS header color and syncs topbar -->
    <script>
        (function() {
            'use strict';

            /**
             * Detects NetSuite's header bar color and syncs the topbar
             * Works whether app is in an iframe or embedded directly
             */
            function syncNetSuiteColor() {
                try {
                    var docs = [];
                    try {
                        if (window.parent && window.parent.document) {
                            docs.push({ doc: window.parent.document, win: window.parent, name: 'parent' });
                        }
                    } catch (e) {}
                    docs.push({ doc: document, win: window, name: 'current' });

                    var headerContainers = [
                        '#div__header', '#ns-header', '#ns_navigation', '.uir-page-header', '#nscm'
                    ];

                    var detectedColor = null;

                    for (var d = 0; d < docs.length; d++) {
                        if (detectedColor) break;
                        var docInfo = docs[d];

                        for (var h = 0; h < headerContainers.length; h++) {
                            if (detectedColor) break;
                            try {
                                var container = docInfo.doc.querySelector(headerContainers[h]);
                                if (!container) continue;

                                var allElements = container.querySelectorAll('*');
                                for (var e = 0; e < allElements.length; e++) {
                                    var element = allElements[e];
                                    if (element.id && element.id.indexOf('skeleton') !== -1) continue;
                                    if (element.classList && element.classList.contains('bgoff')) continue;

                                    var computedStyle = docInfo.win.getComputedStyle(element);
                                    var bgColor = computedStyle.backgroundColor;

                                    if (bgColor && bgColor !== 'transparent' &&
                                        bgColor !== 'rgba(0, 0, 0, 0)' && !isLightOrGrey(bgColor)) {
                                        detectedColor = bgColor;
                                        break;
                                    }
                                }
                            } catch (err) { continue; }
                        }

                        if (!detectedColor) {
                            try {
                                var yPositions = [80, 60, 100, 40];
                                for (var y = 0; y < yPositions.length; y++) {
                                    if (detectedColor) break;
                                    var elements = docInfo.doc.elementsFromPoint(docInfo.win.innerWidth / 2, yPositions[y]);
                                    for (var i = 0; i < elements.length; i++) {
                                        var el = elements[i];
                                        if (el.tagName === 'BODY' || el.tagName === 'HTML') continue;
                                        var style = docInfo.win.getComputedStyle(el);
                                        var bg = style.backgroundColor;
                                        if (bg && bg !== 'transparent' && bg !== 'rgba(0, 0, 0, 0)' && !isLightOrGrey(bg)) {
                                            detectedColor = bg;
                                            break;
                                        }
                                    }
                                }
                            } catch (err) {}
                        }
                    }

                    if (detectedColor) return applyDetectedColor(detectedColor);
                    return false;
                } catch (e) { return false; }
            }

            function syncNetSuiteColorWithRetry(maxRetries, initialDelay) {
                maxRetries = maxRetries || 5;
                initialDelay = initialDelay || 100;
                var attempts = 0;

                function attempt() {
                    attempts++;
                    if (syncNetSuiteColor()) return;
                    if (attempts < maxRetries) {
                        setTimeout(attempt, initialDelay * Math.pow(2, attempts - 1));
                    } else {
                        applyDetectedColor('rgb(30, 41, 59)');
                    }
                }
                attempt();
            }

            function isLightOrGrey(color) {
                var rgb = parseRgb(color);
                if (!rgb) return false;
                var luminance = (0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b) / 255;
                var max = Math.max(rgb.r, rgb.g, rgb.b);
                var min = Math.min(rgb.r, rgb.g, rgb.b);
                var saturation = max === 0 ? 0 : (max - min) / max;
                if (luminance > 0.5) return true;
                if (saturation < 0.1 && luminance > 0.3) return true;
                return false;
            }

            function parseRgb(color) {
                var m = color.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
                return m ? { r: parseInt(m[1], 10), g: parseInt(m[2], 10), b: parseInt(m[3], 10) } : null;
            }

            function getLuminance(rgb) {
                return (0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b) / 255;
            }

            function adjustBrightness(rgb, amount) {
                if (amount < 0) {
                    var f = 1 + amount;
                    return { r: Math.round(Math.max(0, rgb.r * f)), g: Math.round(Math.max(0, rgb.g * f)), b: Math.round(Math.max(0, rgb.b * f)) };
                }
                return { r: Math.round(Math.min(255, rgb.r + (255 - rgb.r) * amount)),
                         g: Math.round(Math.min(255, rgb.g + (255 - rgb.g) * amount)),
                         b: Math.round(Math.min(255, rgb.b + (255 - rgb.b) * amount)) };
            }

            function applyDetectedColor(color) {
                var rgb = parseRgb(color);
                if (!rgb) return false;

                var root = document.documentElement;
                var topbar = document.querySelector('.app-topbar');

                // Lighten detected color slightly for topbar
                var topbarRgb = adjustBrightness(rgb, 0.1);
                var topbarColor = 'rgb(' + topbarRgb.r + ', ' + topbarRgb.g + ', ' + topbarRgb.b + ')';

                var topbarLuminance = getLuminance(topbarRgb);
                var needsLightTheme = topbarLuminance > 0.5;

                var hoverRgb, borderRgb, activeRgb;
                if (needsLightTheme) {
                    hoverRgb = adjustBrightness(topbarRgb, -0.06);
                    borderRgb = adjustBrightness(topbarRgb, -0.1);
                    activeRgb = adjustBrightness(topbarRgb, -0.15);
                    if (topbar) topbar.classList.add('light-theme');
                } else {
                    hoverRgb = adjustBrightness(topbarRgb, 0.12);
                    borderRgb = adjustBrightness(topbarRgb, 0.18);
                    activeRgb = adjustBrightness(topbarRgb, 0.25);
                    if (topbar) topbar.classList.remove('light-theme');
                }

                root.style.setProperty('--surface-topbar', topbarColor);
                root.style.setProperty('--topbar-bg-hover', 'rgb(' + hoverRgb.r + ', ' + hoverRgb.g + ', ' + hoverRgb.b + ')');
                root.style.setProperty('--topbar-border', 'rgb(' + borderRgb.r + ', ' + borderRgb.g + ', ' + borderRgb.b + ')');
                root.style.setProperty('--topbar-active', 'rgb(' + activeRgb.r + ', ' + activeRgb.g + ', ' + activeRgb.b + ')');

                if (topbar) {
                    topbar.style.background = topbarColor;
                    requestAnimationFrame(function() { topbar.classList.add('topbar-ready'); });
                }

                window.FC_COLOR_READY = true;
                console.log('[FC] Topbar color synced:', color, '->', topbarColor);
                return true;
            }

            function revealTopbar() {
                var topbar = document.querySelector('.app-topbar');
                if (topbar && !topbar.classList.contains('topbar-ready')) {
                    topbar.classList.add('topbar-ready');
                }
            }

            window.addEventListener('message', function(event) {
                if (event.data && event.data.type === 'FC_NAVBAR_COLOR' && event.data.color) {
                    applyDetectedColor(event.data.color);
                }
            });

            syncNetSuiteColorWithRetry();

            setTimeout(function() {
                if (!window.FC_COLOR_READY) applyDetectedColor('rgb(30, 41, 59)');
                revealTopbar();
            }, 2000);
        })();
    </script>

    <!-- Config script injected here by Suitelet -->
</head>
<body>
    <div class="app-wrapper">
        <!-- TOPBAR NAVIGATION -->
        <nav class="app-topbar">
            <!-- Logo & Brand -->
            <div class="topbar-brand">
                <div class="topbar-logo">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor"/>
                    </svg>
                </div>
                <span class="brand-name">Flux Capture</span>
            </div>

            <!-- Workflow Tabs (Left to Right Flow) -->
            <div class="topbar-tabs">
                <a href="#" class="topbar-tab active" data-route="ingest">
                    <span class="tab-number">1</span>
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span class="tab-label">Ingest</span>
                    <span class="nav-badge nav-badge-pulse" id="ingest-processing-badge" style="display:none;">0</span>
                </a>
                <div class="tab-connector"><i class="fas fa-chevron-right"></i></div>
                <a href="#" class="topbar-tab" data-route="review">
                    <span class="tab-number">2</span>
                    <i class="fas fa-search-plus"></i>
                    <span class="tab-label">Review</span>
                    <span class="nav-badge" id="review-badge" style="display:none;">0</span>
                </a>
                <div class="tab-connector"><i class="fas fa-chevron-right"></i></div>
                <a href="#" class="topbar-tab" data-route="documents">
                    <span class="tab-number">3</span>
                    <i class="fas fa-check-circle"></i>
                    <span class="tab-label">Documents</span>
                </a>
            </div>

            <!-- Controls (Right Side) -->
            <div class="topbar-controls">
                <button class="topbar-control" data-route="settings" title="Settings">
                    <i class="fas fa-cog"></i>
                </button>
                <button class="topbar-control" id="btn-dark-mode" title="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="topbar-control" id="btn-fullscreen" title="Toggle Fullscreen">
                    <i class="fas fa-expand"></i>
                </button>
                <button class="topbar-control" id="btn-minimize-topbar" title="Minimize Topbar">
                    <i class="fas fa-chevron-up"></i>
                </button>
            </div>
        </nav>

        <!-- MAIN CONTENT AREA -->
        <main class="app-main">
            <!-- Premium Loading Screen -->
            <div class="loading-screen" id="loading-screen">
                <!-- Ambient Particles -->
                <div class="loading-particles">
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                </div>

                <div class="loading-content">
                    <!-- Animated Logo with Orbital Rings -->
                    <div class="loading-logo">
                        <div class="loading-ring"></div>
                        <div class="loading-ring loading-ring-2"></div>
                        <div class="loading-ring loading-ring-3"></div>
                        <div class="loading-icon">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor"/>
                            </svg>
                        </div>
                    </div>

                    <!-- Animated Brand Text -->
                    <div class="loading-brand">
                        <span class="loading-letter" style="--i:0">F</span>
                        <span class="loading-letter" style="--i:1">L</span>
                        <span class="loading-letter" style="--i:2">U</span>
                        <span class="loading-letter" style="--i:3">X</span>
                    </div>

                    <div class="loading-tagline">Document Intelligence</div>

                    <!-- Progress Bar -->
                    <div class="loading-progress">
                        <div class="loading-progress-bar"></div>
                    </div>
                </div>
            </div>

            <!-- View container - views render here -->
            <div id="view-container"></div>
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ============================================
         VIEW TEMPLATES
         ============================================ -->

    <!-- QUEUE TEMPLATE -->
    <script type="text/template" id="tpl-queue">
        <div class="view-queue">
            <header class="view-header">
                <div class="header-content">
                    <h1>Processing Queue</h1>
                    <p class="header-subtitle"><span id="queue-total">0</span> documents in queue</p>
                </div>
                <div class="header-actions">
                    <div class="auto-refresh-control">
                        <label class="toggle-label">
                            <input type="checkbox" id="auto-refresh-toggle" checked>
                            <span class="toggle-text">Auto-refresh</span>
                        </label>
                    </div>
                    <button class="btn btn-secondary" id="btn-refresh" title="Refresh now">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button class="btn btn-primary" id="btn-upload-new">
                        <i class="fas fa-plus"></i> Upload
                    </button>
                </div>
            </header>

            <div class="filter-bar">
                <div class="filter-tabs" id="filter-tabs">
                    <button class="filter-tab active" data-status="">All</button>
                    <button class="filter-tab" data-status="1">Pending</button>
                    <button class="filter-tab" data-status="2">Processing</button>
                    <button class="filter-tab" data-status="4">Needs Review</button>
                    <button class="filter-tab" data-status="7">Errors</button>
                    <button class="filter-tab" data-status="6">Completed</button>
                </div>
            </div>

            <div class="data-table">
                <table>
                    <thead>
                        <tr>
                            <th class="col-check"><input type="checkbox" id="select-all"></th>
                            <th class="col-doc">Document</th>
                            <th>Vendor</th>
                            <th>Invoice #</th>
                            <th class="col-amount">Amount</th>
                            <th class="col-confidence">Confidence</th>
                            <th class="col-status">Status</th>
                            <th class="col-actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="queue-table-body">
                        <!-- Table rows render here -->

    <script type="text/template" id="tpl-documents">

                <div class="inbox-progress">

                        </div>
                        <span class="progress-text" id="progress-text">0% complete today</span>
                    </div>
                    <div class="progress-right">
                        <span class="streak-badge" id="streak-badge" style="display:none;">

                    </button>

                        <i class="fas fa-cloud-arrow-up"></i> Upload

            </div>

                </button>
                <button class="triage-tab" data-filter="medium">
                    <span class="tab-dot medium"></span>
                    <span class="tab-label">Medium</span>
                    <span class="tab-count" id="tab-count-medium">0</span>
                </button>
                <button class="triage-tab" data-filter="low">
                    <span class="tab-dot low"></span>
                    <span class="tab-label">Low</span>
                    <span class="tab-count" id="tab-count-low">0</span>
                </button>
                <button class="triage-tab" data-filter="flagged">
                    <i class="fas fa-flag"></i>
                    <span class="tab-label">Flagged</span>
                    <span class="tab-count" id="tab-count-flagged">0</span>

                <div class="triage-divider"></div>
                <button class="triage-tab" data-filter="completed">

                <button class="triage-tab" data-filter="all">
                    <span class="tab-label">All</span>
                    <span class="tab-count" id="tab-count-all">0</span>
                </button>
                <div class="triage-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="doc-search" placeholder="Search... (/)">
                </div>
            </div>

            <!-- Document List -->
            <div class="document-list" id="document-list">
                <!-- Documents render here -->
            </div>

            <div class="inbox-zero" id="inbox-zero" style="display:none;">

                    </div>

                    <p>You've processed all documents</p>
                    <div class="inbox-zero-stats">
                        <div class="zero-stat">
                            <span class="zero-value" id="zero-processed">0</span>
                            <span class="zero-label">Processed Today</span>
                        </div>
                        <div class="zero-stat">

                            <span class="zero-label">Avg Confidence</span>
                        </div>
                        <div class="zero-stat">

                            <span class="zero-label">Best Streak</span>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-lg" id="btn-upload-from-zero">

                    </button>
                </div>
            </div>

                <div class="palette-modal">
