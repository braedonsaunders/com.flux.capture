<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Capture</title>

    <!-- External dependencies -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- App CSS - Placeholders replaced by Suitelet -->
    <link rel="stylesheet" href="{{CSS_BASE_URL}}">
    <link rel="stylesheet" href="{{CSS_COMPONENTS_URL}}">

    <!-- Critical inline CSS - ensures visibility if external CSS fails -->
    <style>
        /* Critical variables and base styles */
        :root {
            --color-primary: #2563eb;
            --color-primary-glow: rgba(37, 99, 235, 0.4);
            --surface-body: #f8fafc;
            --surface-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-inverse: #ffffff;
            --sidebar-width: 260px;
            --border-color: #e2e8f0;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --radius-lg: 12px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--surface-body);
            color: var(--text-primary);
        }
        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar - hidden until color resolved */
        .app-sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--gray-900), var(--gray-800));
            color: rgba(255,255,255,0.65);
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateX(-10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .app-sidebar.sidebar-ready {
            opacity: 1;
            transform: translateX(0);
        }

        .sidebar-header { padding: var(--space-lg); display: flex; align-items: center; gap: var(--space-md); }
        .sidebar-logo {
            width: 40px; height: 40px;
            background: var(--color-primary);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .sidebar-logo svg { width: 24px; height: 24px; color: white; }
        .brand-name { font-size: 20px; font-weight: 700; color: white; }
        .brand-tagline { font-size: 11px; color: rgba(255,255,255,0.65); text-transform: uppercase; }
        .nav-list { list-style: none; padding: 8px var(--space-md); flex: 1; }
        .nav-section-title {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            color: #64748b; padding: var(--space-md) var(--space-md) 8px;
        }
        .nav-item { margin-bottom: 2px; }
        .nav-link {
            display: flex; align-items: center; gap: var(--space-md);
            padding: 10px var(--space-md); border-radius: 8px;
            color: rgba(255,255,255,0.65); text-decoration: none; cursor: pointer;
        }
        .nav-link:hover { background: var(--sidebar-bg-hover, rgba(255,255,255,0.08)); color: rgba(255,255,255,0.9); }
        .nav-link.active { background: var(--color-primary); color: white; }
        .nav-link i { width: 20px; text-align: center; }
        .sidebar-footer { padding: var(--space-md); border-top: 1px solid rgba(255,255,255,0.08); }
        .sidebar-user { display: flex; align-items: center; gap: var(--space-md); }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 8px;
            background: var(--color-primary); color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 13px;
        }
        .user-name { font-weight: 500; color: white; font-size: 13px; }
        .user-role { font-size: 11px; color: rgba(255,255,255,0.65); }
        .app-main {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #view-container { flex: 1; padding: var(--space-lg) var(--space-xl); }
        .view-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-lg); }
        .view-header h1 { font-size: 28px; font-weight: 700; margin: 0; }
        .header-subtitle { color: var(--text-secondary); margin-top: 4px; }

        /* ==========================================
           PREMIUM LOADING SCREEN
           ========================================== */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
            position: relative;
        }

        /* Animated Logo Container */
        .loading-logo {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 32px;
        }

        /* Orbital Rings */
        .loading-ring {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: ring-spin 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }
        .loading-ring-2 {
            inset: 8px;
            border-top-color: rgba(37, 99, 235, 0.5);
            animation-duration: 2s;
            animation-direction: reverse;
        }
        .loading-ring-3 {
            inset: 16px;
            border-top-color: rgba(37, 99, 235, 0.3);
            animation-duration: 2.5s;
        }

        @keyframes ring-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Center Icon */
        .loading-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background: var(--color-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px var(--color-primary-glow), 0 0 80px var(--color-primary-glow);
            animation: icon-pulse 2s ease-in-out infinite;
        }
        .loading-icon svg {
            width: 28px;
            height: 28px;
            color: white;
        }

        @keyframes icon-pulse {
            0%, 100% {
                box-shadow: 0 0 40px var(--color-primary-glow), 0 0 80px var(--color-primary-glow);
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                box-shadow: 0 0 60px var(--color-primary-glow), 0 0 120px var(--color-primary-glow);
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        /* Brand Text with Letter Animation */
        .loading-brand {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 8px;
        }
        .loading-letter {
            font-size: 32px;
            font-weight: 800;
            color: white;
            opacity: 0;
            transform: translateY(20px);
            animation: letter-in 0.5s ease forwards;
            animation-delay: calc(var(--i) * 0.1s);
        }

        @keyframes letter-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tagline */
        .loading-tagline {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            opacity: 0;
            animation: fade-in 0.5s ease 0.6s forwards;
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }

        /* Progress Bar */
        .loading-progress {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 0 auto;
            overflow: hidden;
        }
        .loading-progress-bar {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, var(--color-primary), #60a5fa);
            border-radius: 3px;
            animation: progress-slide 1.5s ease-in-out infinite;
        }

        @keyframes progress-slide {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 60%; }
            100% { transform: translateX(400%); width: 30%; }
        }

        /* Ambient Particles */
        .loading-particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--color-primary);
            border-radius: 50%;
            opacity: 0;
            animation: particle-float 3s ease-in-out infinite;
        }
        .particle:nth-child(1) { left: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 40%; animation-delay: 0.5s; }
        .particle:nth-child(3) { left: 60%; animation-delay: 1s; }
        .particle:nth-child(4) { left: 80%; animation-delay: 1.5s; }

        @keyframes particle-float {
            0% { bottom: -10px; opacity: 0; transform: scale(0); }
            20% { opacity: 0.6; transform: scale(1); }
            80% { opacity: 0.6; }
            100% { bottom: 100%; opacity: 0; transform: scale(0); }
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 10px var(--space-md); font-size: 14px; font-weight: 500;
            border-radius: 8px; border: none; cursor: pointer;
        }
        .btn-primary { background: var(--color-primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .card {
            background: var(--surface-card); border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
        }
        .card-header {
            padding: var(--space-md) var(--space-lg);
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-title { font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .card-body { padding: var(--space-lg); }
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: var(--space-md); margin-bottom: var(--space-lg); }
        .kpi-card {
            background: var(--surface-card); border-radius: var(--radius-lg);
            padding: var(--space-lg); border: 1px solid var(--border-color);
            display: flex; align-items: flex-start; gap: var(--space-md);
        }
        .kpi-value { font-size: 28px; font-weight: 700; line-height: 1.2; }
        .kpi-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-lg); }
        .toast-container {
            position: fixed; bottom: var(--space-lg); right: var(--space-lg);
            z-index: 10001; display: flex; flex-direction: column; gap: 8px;
        }
    </style>

    <!-- NetSuite navbar color sync script - detects NS header color and syncs sidebar -->
    <script>
        (function() {
            'use strict';

            /**
             * Detects NetSuite's header bar color and syncs the sidebar
             * Works whether app is in an iframe or embedded directly
             */
            function syncNetSuiteColor() {
                try {
                    // Try parent document first, fall back to current document
                    var docs = [];
                    try {
                        if (window.parent && window.parent.document) {
                            docs.push({ doc: window.parent.document, win: window.parent, name: 'parent' });
                        }
                    } catch (e) {
                        // Cross-origin, can't access parent
                    }
                    docs.push({ doc: document, win: window, name: 'current' });

                    // NetSuite header container selectors
                    var headerContainers = [
                        '#div__header',          // Redwood theme header
                        '#ns-header',            // Modern NetSuite header
                        '#ns_navigation',        // Navigation bar
                        '.uir-page-header',      // Classic UI header
                        '#nscm'                  // NetSuite Center Menu
                    ];

                    var detectedColor = null;

                    // Try each document
                    for (var d = 0; d < docs.length; d++) {
                        if (detectedColor) break;
                        var docInfo = docs[d];

                        // Scan header containers and their descendants
                        for (var h = 0; h < headerContainers.length; h++) {
                            if (detectedColor) break;
                            try {
                                var container = docInfo.doc.querySelector(headerContainers[h]);
                                if (!container) continue;

                                var allElements = container.querySelectorAll('*');
                                for (var e = 0; e < allElements.length; e++) {
                                    var element = allElements[e];
                                    if (element.id && element.id.indexOf('skeleton') !== -1) continue;
                                    if (element.classList && element.classList.contains('bgoff')) continue;

                                    var computedStyle = docInfo.win.getComputedStyle(element);
                                    var bgColor = computedStyle.backgroundColor;

                                    if (bgColor && bgColor !== 'transparent' &&
                                        bgColor !== 'rgba(0, 0, 0, 0)' &&
                                        !isLightOrGrey(bgColor)) {
                                        detectedColor = bgColor;
                                        break;
                                    }
                                }
                            } catch (err) {
                                continue;
                            }
                        }

                        // Fallback: elementsFromPoint at nav bar height
                        if (!detectedColor) {
                            try {
                                var yPositions = [80, 60, 100, 40];
                                for (var y = 0; y < yPositions.length; y++) {
                                    if (detectedColor) break;
                                    var elements = docInfo.doc.elementsFromPoint(docInfo.win.innerWidth / 2, yPositions[y]);
                                    for (var i = 0; i < elements.length; i++) {
                                        var el = elements[i];
                                        if (el.tagName === 'BODY' || el.tagName === 'HTML') continue;
                                        if (el.id && el.id.indexOf('skeleton') !== -1) continue;

                                        var style = docInfo.win.getComputedStyle(el);
                                        var bg = style.backgroundColor;

                                        if (bg && bg !== 'transparent' &&
                                            bg !== 'rgba(0, 0, 0, 0)' &&
                                            !isLightOrGrey(bg)) {
                                            detectedColor = bg;
                                            break;
                                        }
                                    }
                                }
                            } catch (err) {}
                        }
                    }

                    if (detectedColor) {
                        return applyDetectedColor(detectedColor);
                    }
                    return false;
                } catch (e) {
                    return false;
                }
            }

            /**
             * Retry with exponential backoff for async-loaded themes
             */
            function syncNetSuiteColorWithRetry(maxRetries, initialDelay) {
                maxRetries = maxRetries || 5;
                initialDelay = initialDelay || 100;
                var attempts = 0;

                function attempt() {
                    attempts++;
                    var success = syncNetSuiteColor();

                    if (success) return;

                    if (attempts < maxRetries) {
                        var delay = initialDelay * Math.pow(2, attempts - 1);
                        setTimeout(attempt, delay);
                    } else {
                        // Apply default dark sidebar
                        applyDetectedColor('rgb(30, 41, 59)');
                    }
                }
                attempt();
            }

            /**
             * Check if color is light or grey (skip light backgrounds, we want the dark nav bar)
             * More aggressive filtering to skip the lighter top section and match the darker nav
             */
            function isLightOrGrey(color) {
                var rgb = parseRgb(color);
                if (!rgb) return false;

                var luminance = (0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b) / 255;
                var max = Math.max(rgb.r, rgb.g, rgb.b);
                var min = Math.min(rgb.r, rgb.g, rgb.b);
                var saturation = max === 0 ? 0 : (max - min) / max;

                // Skip if luminance > 0.5 (we want dark colors only, like the nav bar)
                if (luminance > 0.5) return true;

                // Skip if very unsaturated (grey)
                if (saturation < 0.1 && luminance > 0.3) return true;

                return false;
            }

            /**
             * Parse RGB color string
             */
            function parseRgb(color) {
                var rgbMatch = color.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
                if (rgbMatch) {
                    return { r: parseInt(rgbMatch[1], 10), g: parseInt(rgbMatch[2], 10), b: parseInt(rgbMatch[3], 10) };
                }
                var rgbaMatch = color.match(/rgba\((\d+),\s*(\d+),\s*(\d+),\s*[\d.]+\)/);
                if (rgbaMatch) {
                    return { r: parseInt(rgbaMatch[1], 10), g: parseInt(rgbaMatch[2], 10), b: parseInt(rgbaMatch[3], 10) };
                }
                return null;
            }

            /**
             * Get luminance (0 = black, 1 = white)
             */
            function getLuminance(rgb) {
                return (0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b) / 255;
            }

            /**
             * Adjust brightness (-1 to 1)
             */
            function adjustBrightness(rgb, amount) {
                if (amount < 0) {
                    var factor = 1 + amount;
                    return {
                        r: Math.round(Math.max(0, rgb.r * factor)),
                        g: Math.round(Math.max(0, rgb.g * factor)),
                        b: Math.round(Math.max(0, rgb.b * factor))
                    };
                } else {
                    return {
                        r: Math.round(Math.min(255, rgb.r + (255 - rgb.r) * amount)),
                        g: Math.round(Math.min(255, rgb.g + (255 - rgb.g) * amount)),
                        b: Math.round(Math.min(255, rgb.b + (255 - rgb.b) * amount))
                    };
                }
            }

            /**
             * Apply detected color to sidebar
             */
            function applyDetectedColor(color) {
                var rgb = parseRgb(color);
                if (!rgb) return false;

                var root = document.documentElement;
                var sidebar = document.querySelector('.app-sidebar');

                // Lighten detected color by 15% for sidebar
                var sidebarRgb = adjustBrightness(rgb, 0.15);
                var sidebarColor = 'rgb(' + sidebarRgb.r + ', ' + sidebarRgb.g + ', ' + sidebarRgb.b + ')';

                // Check luminance for text contrast
                var sidebarLuminance = getLuminance(sidebarRgb);
                var needsLightTheme = sidebarLuminance > 0.5;

                // Calculate hover and border colors
                var hoverRgb, borderRgb;
                if (needsLightTheme) {
                    hoverRgb = adjustBrightness(sidebarRgb, -0.08);
                    borderRgb = adjustBrightness(sidebarRgb, -0.12);
                    if (sidebar) sidebar.classList.add('light-theme');
                } else {
                    hoverRgb = adjustBrightness(sidebarRgb, 0.15);
                    borderRgb = adjustBrightness(sidebarRgb, 0.20);
                    if (sidebar) sidebar.classList.remove('light-theme');
                }

                // Apply CSS variables
                root.style.setProperty('--surface-sidebar', sidebarColor);
                root.style.setProperty('--sidebar-bg-hover', 'rgb(' + hoverRgb.r + ', ' + hoverRgb.g + ', ' + hoverRgb.b + ')');
                root.style.setProperty('--sidebar-border', 'rgb(' + borderRgb.r + ', ' + borderRgb.g + ', ' + borderRgb.b + ')');

                // Apply directly to sidebar
                if (sidebar) {
                    sidebar.style.background = sidebarColor;

                    // Reveal sidebar with animation after color is applied
                    requestAnimationFrame(function() {
                        sidebar.classList.add('sidebar-ready');
                    });
                }

                // Mark color as ready globally
                window.FC_COLOR_READY = true;

                console.log('[FC] Sidebar color synced with NetSuite navbar:', color, '->', sidebarColor);
                return true;
            }

            /**
             * Reveal sidebar (called after color detection or as fallback)
             */
            function revealSidebar() {
                var sidebar = document.querySelector('.app-sidebar');
                if (sidebar && !sidebar.classList.contains('sidebar-ready')) {
                    sidebar.classList.add('sidebar-ready');
                }
            }

            // Also listen for postMessage as fallback
            window.addEventListener('message', function(event) {
                if (event.data && event.data.type === 'FC_NAVBAR_COLOR' && event.data.color) {
                    applyDetectedColor(event.data.color);
                }
            });

            // Run color detection immediately
            syncNetSuiteColorWithRetry();

            // Safety net: reveal sidebar after max wait time even if detection fails
            setTimeout(function() {
                if (!window.FC_COLOR_READY) {
                    applyDetectedColor('rgb(30, 41, 59)'); // Default dark color
                }
                revealSidebar();
            }, 2000);
        })();
    </script>

    <!-- Config script injected here by Suitelet -->
</head>
<body>
    <div class="app-wrapper">
        <!-- SIDEBAR NAVIGATION -->
        <nav class="app-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor"/>
                    </svg>
                </div>
                <div class="sidebar-brand">
                    <span class="brand-name">Flux</span>
                    <span class="brand-tagline">Document Intelligence</span>
                </div>
            </div>

            <ul class="nav-list">
                <li class="nav-section-title">Overview</li>
                <li class="nav-item">
                    <a href="#" class="nav-link active" data-route="dashboard">
                        <i class="fas fa-chart-line"></i>
                        <span>Dashboard</span>
                    </a>
                </li>

                <li class="nav-section-title">Documents</li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-route="upload">
                        <i class="fas fa-cloud-arrow-up"></i>
                        <span>Upload</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-route="queue">
                        <i class="fas fa-layer-group"></i>
                        <span>Processing</span>
                        <span class="nav-badge" id="queue-badge" style="display:none;">0</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-route="batch">
                        <i class="fas fa-boxes-stacked"></i>
                        <span>Batches</span>
                    </a>
                </li>

                <li class="nav-section-title">System</li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-route="settings">
                        <i class="fas fa-sliders"></i>
                        <span>Settings</span>
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <div class="user-info">
                        <div class="user-name" id="user-name">User</div>
                        <div class="user-role">Administrator</div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- MAIN CONTENT AREA -->
        <main class="app-main">
            <!-- Premium Loading Screen -->
            <div class="loading-screen" id="loading-screen">
                <!-- Ambient Particles -->
                <div class="loading-particles">
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                </div>

                <div class="loading-content">
                    <!-- Animated Logo with Orbital Rings -->
                    <div class="loading-logo">
                        <div class="loading-ring"></div>
                        <div class="loading-ring loading-ring-2"></div>
                        <div class="loading-ring loading-ring-3"></div>
                        <div class="loading-icon">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor"/>
                            </svg>
                        </div>
                    </div>

                    <!-- Animated Brand Text -->
                    <div class="loading-brand">
                        <span class="loading-letter" style="--i:0">F</span>
                        <span class="loading-letter" style="--i:1">L</span>
                        <span class="loading-letter" style="--i:2">U</span>
                        <span class="loading-letter" style="--i:3">X</span>
                    </div>

                    <div class="loading-tagline">Document Intelligence</div>

                    <!-- Progress Bar -->
                    <div class="loading-progress">
                        <div class="loading-progress-bar"></div>
                    </div>
                </div>
            </div>

            <!-- View container - views render here -->
            <div id="view-container"></div>
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ============================================
         VIEW TEMPLATES
         ============================================ -->

    <!-- DASHBOARD TEMPLATE -->
    <script type="text/template" id="tpl-dashboard">
        <div class="view-dashboard">
            <header class="view-header">
                <div class="header-content">
                    <h1>Dashboard</h1>
                    <p class="header-subtitle">Real-time document processing intelligence</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary btn-lg" id="btn-new-upload">
                        <i class="fas fa-plus"></i> New Upload
                    </button>
                </div>
            </header>

            <div class="kpi-row" id="kpi-container">
                <!-- KPIs render here -->
            </div>

            <div class="dashboard-grid">
                <div class="card card-lg">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-clock-rotate-left"></i> Recent Activity</div>
                        <a href="#" class="card-action" data-route="queue">View All</a>
                    </div>
                    <div class="card-body" id="activity-container">
                        <!-- Activity list renders here -->
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-triangle-exclamation"></i> Alerts</div>
                        <span class="alert-count" id="alert-count">0</span>
                    </div>
                    <div class="card-body" id="alerts-container">
                        <!-- Alerts render here -->
                    </div>
                </div>
            </div>
        </div>
    </script>

    <!-- UPLOAD TEMPLATE -->
    <script type="text/template" id="tpl-upload">
        <div class="view-upload">
            <header class="view-header">
                <div class="header-content">
                    <h1>Upload Documents</h1>
                    <p class="header-subtitle">Drag and drop or select files to process</p>
                </div>
            </header>

            <div class="upload-wrapper">
                <div class="upload-type-selector" id="type-selector">
                    <label class="type-card active">
                        <input type="radio" name="docType" value="auto" checked>
                        <div class="type-icon"><i class="fas fa-wand-magic-sparkles"></i></div>
                        <span>Auto-Detect</span>
                    </label>
                    <label class="type-card">
                        <input type="radio" name="docType" value="INVOICE">
                        <div class="type-icon"><i class="fas fa-file-invoice-dollar"></i></div>
                        <span>Invoice</span>
                    </label>
                    <label class="type-card">
                        <input type="radio" name="docType" value="RECEIPT">
                        <div class="type-icon"><i class="fas fa-receipt"></i></div>
                        <span>Receipt</span>
                    </label>
                    <label class="type-card">
                        <input type="radio" name="docType" value="EXPENSE">
                        <div class="type-icon"><i class="fas fa-file-lines"></i></div>
                        <span>Expense</span>
                    </label>
                </div>

                <div class="upload-dropzone" id="upload-zone">
                    <div class="dropzone-content">
                        <div class="dropzone-icon"><i class="fas fa-cloud-arrow-up"></i></div>
                        <h3>Drop files here</h3>
                        <p>or click to browse</p>
                        <div class="dropzone-formats">
                            <span class="format-tag">PDF</span>
                            <span class="format-tag">PNG</span>
                            <span class="format-tag">JPG</span>
                            <span class="format-tag">TIFF</span>
                        </div>
                    </div>
                    <input type="file" id="file-input" multiple accept=".pdf,.png,.jpg,.jpeg,.tiff,.tif" hidden>
                </div>

                <div class="upload-queue" id="upload-queue" style="display:none;">
                    <div class="queue-header">
                        <h3><i class="fas fa-list-check"></i> Ready to Upload</h3>
                        <button class="btn btn-ghost btn-sm" id="btn-clear-queue">Clear All</button>
                    </div>
                    <div class="queue-list" id="queue-list"></div>
                    <div class="queue-footer">
                        <button class="btn btn-secondary" id="btn-add-more"><i class="fas fa-plus"></i> Add More</button>
                        <button class="btn btn-primary btn-lg" id="btn-process">
                            <i class="fas fa-bolt"></i> Process <span id="file-count">0</span> Files
                        </button>
                    </div>
                </div>

                <div class="upload-progress" id="upload-progress" style="display:none;">
                    <div class="progress-visual">
                        <div class="progress-spinner" id="progress-spinner"></div>
                        <div id="progress-complete"></div>
                        <h3 id="progress-title">Processing...</h3>
                        <p id="progress-text">Preparing files...</p>
                        <div class="progress-track">
                            <div class="progress-bar" id="progress-bar"></div>
                        </div>
                        <div id="progress-details"></div>
                    </div>
                </div>
            </div>
        </div>
    </script>

    <!-- QUEUE TEMPLATE -->
    <script type="text/template" id="tpl-queue">
        <div class="view-queue">
            <header class="view-header">
                <div class="header-content">
                    <h1>Processing Queue</h1>
                    <p class="header-subtitle"><span id="queue-total">0</span> documents in queue</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" id="btn-upload-new">
                        <i class="fas fa-plus"></i> Upload
                    </button>
                </div>
            </header>

            <div class="filter-bar">
                <div class="filter-tabs" id="filter-tabs">
                    <button class="filter-tab active" data-status="">All</button>
                    <button class="filter-tab" data-status="1">Pending</button>
                    <button class="filter-tab" data-status="4">Needs Review</button>
                    <button class="filter-tab" data-status="6">Completed</button>
                </div>
            </div>

            <div class="data-table">
                <table>
                    <thead>
                        <tr>
                            <th class="col-check"><input type="checkbox" id="select-all"></th>
                            <th class="col-doc">Document</th>
                            <th>Vendor</th>
                            <th>Invoice #</th>
                            <th class="col-amount">Amount</th>
                            <th class="col-confidence">Confidence</th>
                            <th class="col-status">Status</th>
                            <th class="col-actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="queue-table-body">
                        <!-- Table rows render here -->
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </script>

    <!-- REVIEW TEMPLATE -->
    <script type="text/template" id="tpl-review">
        <div class="view-review">
            <div class="review-toolbar">
                <div class="toolbar-left">
                    <button class="btn btn-ghost" id="btn-back">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                    <div class="toolbar-nav">
                        <button class="btn btn-ghost btn-icon" id="btn-doc-prev" title="Previous Document (Ctrl+←)" disabled>
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span class="doc-counter" id="doc-counter" style="display:none;">1 of 1</span>
                        <button class="btn btn-ghost btn-icon" id="btn-doc-next" title="Next Document (Ctrl+→)" disabled>
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
                <div class="toolbar-title">
                    <span class="doc-type-badge" id="doc-type-badge">Invoice</span>
                    <span id="doc-title">Document Review</span>
                </div>
                <div class="toolbar-actions">
                    <button class="btn btn-danger" id="btn-reject" title="Reject (Ctrl+R)">
                        <i class="fas fa-xmark"></i> Reject
                    </button>
                    <button class="btn btn-success" id="btn-approve" title="Approve (Enter)">
                        <i class="fas fa-check"></i> Approve & Create
                    </button>
                </div>
            </div>

            <div class="review-content">
                <div class="preview-panel">
                    <div class="preview-tools">
                        <button class="btn btn-icon btn-ghost" id="btn-zoom-out" title="Zoom Out (-)">
                            <i class="fas fa-minus"></i>
                        </button>
                        <span class="zoom-level" id="zoom-level">100%</span>
                        <button class="btn btn-icon btn-ghost" id="btn-zoom-in" title="Zoom In (+)">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="btn btn-icon btn-ghost" id="btn-zoom-reset" title="Reset Zoom (Ctrl+0)">
                            <i class="fas fa-expand"></i>
                        </button>
                        <div class="preview-divider"></div>
                        <button class="btn btn-icon btn-ghost" id="btn-rotate" title="Rotate">
                            <i class="fas fa-rotate-right"></i>
                        </button>
                        <button class="btn btn-icon btn-ghost" id="btn-download" title="Download">
                            <i class="fas fa-download"></i>
                        </button>
                        <div class="preview-divider"></div>
                        <span class="page-display" id="page-display">1 / 1</span>
                    </div>
                    <div class="preview-viewport" id="preview-viewport">
                        <!-- Document preview renders here -->
                    </div>
                </div>

                <div class="extraction-panel" id="extraction-panel">
                    <!-- Extraction form renders here -->
                </div>
            </div>
        </div>
    </script>

    <!-- BATCH TEMPLATE -->
    <script type="text/template" id="tpl-batch">
        <div class="view-batch">
            <header class="view-header">
                <div class="header-content">
                    <h1>Batch Processing</h1>
                    <p class="header-subtitle">Manage document batches</p>
                </div>
            </header>

            <div class="card">
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-boxes-stacked"></i> Recent Batches</div>
                </div>
                <div class="card-body">
                    <div class="data-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>Batch Name</th>
                                    <th>Documents</th>
                                    <th>Progress</th>
                                    <th>Status</th>
                                    <th>Created</th>
                                    <th class="col-actions">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="batch-table-body">
                                <!-- Batch rows render here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </script>

    <!-- SETTINGS TEMPLATE -->
    <script type="text/template" id="tpl-settings">
        <div class="view-settings">
            <header class="view-header">
                <div class="header-content">
                    <h1>Settings</h1>
                    <p class="header-subtitle">Configure Flux Capture</p>
                </div>
            </header>

            <div class="settings-layout">
                <div class="settings-card">
                    <div class="settings-card-header">
                        <i class="fas fa-microchip"></i>
                        <div>
                            <h3>Processing</h3>
                            <p>Configure AI extraction settings</p>
                        </div>
                    </div>
                    <div class="settings-card-body">
                        <div class="setting-row">
                            <div class="setting-label">
                                <span>Auto-approve Threshold</span>
                                <small>Documents above this confidence are auto-approved</small>
                            </div>
                            <div class="setting-control">
                                <input type="range" min="70" max="100" value="85" id="auto-threshold">
                                <span id="threshold-value" class="range-value">85%</span>
                            </div>
                        </div>
                        <div class="setting-row">
                            <div class="setting-label">
                                <span>Default Document Type</span>
                                <small>Used when auto-detect is disabled</small>
                            </div>
                            <div class="setting-control">
                                <select id="default-type">
                                    <option value="auto">Auto-Detect</option>
                                    <option value="INVOICE">Invoice</option>
                                    <option value="RECEIPT">Receipt</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="settings-card">
                    <div class="settings-card-header">
                        <i class="fas fa-shield-halved"></i>
                        <div>
                            <h3>Fraud Detection</h3>
                            <p>Configure anomaly detection rules</p>
                        </div>
                    </div>
                    <div class="settings-card-body">
                        <div class="setting-row">
                            <div class="setting-label">
                                <span>Duplicate Detection</span>
                                <small>Flag potential duplicate invoices</small>
                            </div>
                            <div class="setting-control">
                                <label class="toggle">
                                    <input type="checkbox" id="duplicate-detection" checked>
                                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                                </label>
                            </div>
                        </div>
                        <div class="setting-row">
                            <div class="setting-label">
                                <span>Amount Validation</span>
                                <small>Verify line items sum to total</small>
                            </div>
                            <div class="setting-control">
                                <label class="toggle">
                                    <input type="checkbox" id="amount-validation" checked>
                                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="settings-footer">
                <button class="btn btn-primary btn-lg" id="btn-save-settings">
                    <i class="fas fa-check"></i> Save Changes
                </button>
            </div>
        </div>
    </script>
