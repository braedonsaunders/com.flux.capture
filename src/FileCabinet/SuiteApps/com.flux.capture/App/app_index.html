<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Capture</title>

    <!-- External dependencies -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- PDF.js for document rendering with annotations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configure PDF.js worker
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
    </script>

    <!-- App CSS - Placeholders replaced by Suitelet -->
    <link rel="stylesheet" href="{{CSS_BASE_URL}}">
    <link rel="stylesheet" href="{{CSS_COMPONENTS_URL}}">

    <!-- Critical inline CSS - ensures visibility if external CSS fails -->
    <style>
        /* Critical variables and base styles */
        :root {
            --color-primary: #2563eb;
            --color-primary-glow: rgba(37, 99, 235, 0.4);
            --surface-body: #f8fafc;
            --surface-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-inverse: #ffffff;
            --sidebar-width: 260px;
            --border-color: #e2e8f0;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --radius-lg: 12px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--surface-body);
            color: var(--text-primary);
        }
        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar - hidden until color resolved */
        .app-sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--gray-900), var(--gray-800));
            color: rgba(255,255,255,0.65);
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateX(-10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .app-sidebar.sidebar-ready {
            opacity: 1;
            transform: translateX(0);
        }

        .sidebar-header { padding: var(--space-lg); display: flex; align-items: center; gap: var(--space-md); }
        .sidebar-logo {
            width: 40px; height: 40px;
            background: var(--color-primary);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .sidebar-logo svg { width: 24px; height: 24px; color: white; }
        .brand-name { font-size: 20px; font-weight: 700; color: white; }
        .brand-tagline { font-size: 11px; color: rgba(255,255,255,0.65); text-transform: uppercase; }
        .nav-list { list-style: none; padding: 8px var(--space-md); flex: 1; }
        .nav-section-title {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            color: #64748b; padding: var(--space-md) var(--space-md) 8px;
        }
        .nav-item { margin-bottom: 2px; }
        .nav-link {
            display: flex; align-items: center; gap: var(--space-md);
            padding: 10px var(--space-md); border-radius: 8px;
            color: rgba(255,255,255,0.65); text-decoration: none; cursor: pointer;
        }
        .nav-link:hover { background: var(--sidebar-bg-hover, rgba(255,255,255,0.08)); color: rgba(255,255,255,0.9); }
        .nav-link.active { background: var(--color-primary); color: white; }
        .nav-link i { width: 20px; text-align: center; }
        .sidebar-footer { padding: var(--space-md); border-top: 1px solid rgba(255,255,255,0.08); }
        .sidebar-controls {
            display: flex;
            justify-content: center;
            gap: 4px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 8px;
        }
        .sidebar-control {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sidebar-control:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .sidebar-control.active {
            background: var(--color-primary);
            color: white;
        }
        .sidebar-expand-btn {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%) translateX(-100%);
            width: 28px;
            height: 56px;
            border: none;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            border-radius: 0 8px 8px 0;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 101;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), width 0.2s ease;
            box-shadow: 2px 0 8px rgba(0,0,0,0.15);
        }
        .sidebar-expand-btn:hover { width: 36px; background: var(--color-primary); color: white; }
        .app-sidebar {
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        padding 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .app-main { transition: margin-left 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        body.sidebar-collapsed .app-sidebar { width: 0; padding: 0; overflow: hidden; transform: translateX(-100%); }
        body.sidebar-collapsed .sidebar-expand-btn { transform: translateY(-50%) translateX(0); }
        body.sidebar-collapsed .app-main { margin-left: 0; }
        .app-main {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #view-container {
            flex: 1;
            padding: 0;
            will-change: transform, opacity;
        }

        /* Exit animation - fade out and slide up */
        #view-container.view-exiting {
            animation: viewExit 0.25s cubic-bezier(0.4, 0, 0.6, 1) forwards;
        }

        /* Enter animation - fade in and slide up from below */
        #view-container.view-entering {
            opacity: 0;
            transform: translateY(12px);
        }

        #view-container.view-entered {
            animation: viewEnter 0.25s cubic-bezier(0, 0, 0.2, 1) forwards;
        }

        @keyframes viewExit {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-8px);
            }
        }

        @keyframes viewEnter {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .view-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-lg); }
        .view-header h1 { font-size: 28px; font-weight: 700; margin: 0; }
        .header-subtitle { color: var(--text-secondary); margin-top: 4px; }

        /* ==========================================
           PREMIUM LOADING SCREEN
           ========================================== */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
            position: relative;
        }

        /* Animated Logo Container */
        .loading-logo {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 32px;
        }

        /* Orbital Rings */
        .loading-ring {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: ring-spin 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }
        .loading-ring-2 {
            inset: 8px;
            border-top-color: rgba(37, 99, 235, 0.5);
            animation-duration: 2s;
            animation-direction: reverse;
        }
        .loading-ring-3 {
            inset: 16px;
            border-top-color: rgba(37, 99, 235, 0.3);
            animation-duration: 2.5s;
        }

        @keyframes ring-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Center Icon */
        .loading-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background: var(--color-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px var(--color-primary-glow), 0 0 80px var(--color-primary-glow);
            animation: icon-pulse 2s ease-in-out infinite;
        }
        .loading-icon svg {
            width: 28px;
            height: 28px;
            color: white;
        }

        @keyframes icon-pulse {
            0%, 100% {
                box-shadow: 0 0 40px var(--color-primary-glow), 0 0 80px var(--color-primary-glow);
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                box-shadow: 0 0 60px var(--color-primary-glow), 0 0 120px var(--color-primary-glow);
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        /* Brand Text with Letter Animation */
        .loading-brand {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 8px;
        }
        .loading-letter {
            font-size: 32px;
            font-weight: 800;
            color: white;
            opacity: 0;
            transform: translateY(20px);
            animation: letter-in 0.5s ease forwards;
            animation-delay: calc(var(--i) * 0.1s);
        }

        @keyframes letter-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tagline */
        .loading-tagline {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            opacity: 0;
            animation: fade-in 0.5s ease 0.6s forwards;
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }

        /* Progress Bar */
        .loading-progress {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 0 auto;
            overflow: hidden;
        }
        .loading-progress-bar {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, var(--color-primary), #60a5fa);
            border-radius: 3px;
            animation: progress-slide 1.5s ease-in-out infinite;
        }

        @keyframes progress-slide {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 60%; }
            100% { transform: translateX(400%); width: 30%; }
        }

        /* Ambient Particles */
        .loading-particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--color-primary);
            border-radius: 50%;
            opacity: 0;
            animation: particle-float 3s ease-in-out infinite;
        }
        .particle:nth-child(1) { left: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 40%; animation-delay: 0.5s; }
        .particle:nth-child(3) { left: 60%; animation-delay: 1s; }
        .particle:nth-child(4) { left: 80%; animation-delay: 1.5s; }

        @keyframes particle-float {
            0% { bottom: -10px; opacity: 0; transform: scale(0); }
            20% { opacity: 0.6; transform: scale(1); }
            80% { opacity: 0.6; }
            100% { bottom: 100%; opacity: 0; transform: scale(0); }
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 10px var(--space-md); font-size: 14px; font-weight: 500;
            border-radius: 8px; border: none; cursor: pointer;
        }
        .btn-primary { background: var(--color-primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .card {
            background: var(--surface-card); border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
        }
        .card-header {
            padding: var(--space-md) var(--space-lg);
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-title { font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .card-body { padding: var(--space-lg); }
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: var(--space-md); margin-bottom: var(--space-lg); }
        .kpi-card {
            background: var(--surface-card); border-radius: var(--radius-lg);
            padding: var(--space-lg); border: 1px solid var(--border-color);
            display: flex; align-items: flex-start; gap: var(--space-md);
        }
        .kpi-value { font-size: 28px; font-weight: 700; line-height: 1.2; }
        .kpi-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-lg); }
        .toast-container {
            position: fixed; bottom: var(--space-lg); right: var(--space-lg);
            z-index: 10001; display: flex; flex-direction: column; gap: 8px;
        }
    </style>

    <!-- NetSuite navbar color sync script - detects NS header color and syncs sidebar -->
    <script>
        (function() {
            'use strict';

            /**
             * Detects NetSuite's header bar color and syncs the sidebar
             * Works whether app is in an iframe or embedded directly
             */
            function syncNetSuiteColor() {
                try {
                    // Try parent document first, fall back to current document
                    var docs = [];
                    try {
                        if (window.parent && window.parent.document) {
                            docs.push({ doc: window.parent.document, win: window.parent, name: 'parent' });
                        }
                    } catch (e) {
                        // Cross-origin, can't access parent
                    }
                    docs.push({ doc: document, win: window, name: 'current' });

                    // NetSuite header container selectors
                    var headerContainers = [
                        '#div__header',          // Redwood theme header
                        '#ns-header',            // Modern NetSuite header
                        '#ns_navigation',        // Navigation bar
                        '.uir-page-header',      // Classic UI header
                        '#nscm'                  // NetSuite Center Menu
                    ];

                    var detectedColor = null;

                    // Try each document
                    for (var d = 0; d < docs.length; d++) {
                        if (detectedColor) break;
                        var docInfo = docs[d];

                        // Scan header containers and their descendants
                        for (var h = 0; h < headerContainers.length; h++) {
                            if (detectedColor) break;
                            try {
                                var container = docInfo.doc.querySelector(headerContainers[h]);
                                if (!container) continue;

                                var allElements = container.querySelectorAll('*');
                                for (var e = 0; e < allElements.length; e++) {
                                    var element = allElements[e];
                                    if (element.id && element.id.indexOf('skeleton') !== -1) continue;
                                    if (element.classList && element.classList.contains('bgoff')) continue;

                                    var computedStyle = docInfo.win.getComputedStyle(element);
                                    var bgColor = computedStyle.backgroundColor;

                                    if (bgColor && bgColor !== 'transparent' &&
                                        bgColor !== 'rgba(0, 0, 0, 0)' &&
                                        !isLightOrGrey(bgColor)) {
                                        detectedColor = bgColor;
                                        break;
                                    }
                                }
                            } catch (err) {
                                continue;
                            }
                        }

                        // Fallback: elementsFromPoint at nav bar height
                        if (!detectedColor) {
                            try {
                                var yPositions = [80, 60, 100, 40];
                                for (var y = 0; y < yPositions.length; y++) {
                                    if (detectedColor) break;
                                    var elements = docInfo.doc.elementsFromPoint(docInfo.win.innerWidth / 2, yPositions[y]);
                                    for (var i = 0; i < elements.length; i++) {
                                        var el = elements[i];
                                        if (el.tagName === 'BODY' || el.tagName === 'HTML') continue;
                                        if (el.id && el.id.indexOf('skeleton') !== -1) continue;

                                        var style = docInfo.win.getComputedStyle(el);
                                        var bg = style.backgroundColor;

                                        if (bg && bg !== 'transparent' &&
                                            bg !== 'rgba(0, 0, 0, 0)' &&
                                            !isLightOrGrey(bg)) {
                                            detectedColor = bg;
                                            break;
                                        }
                                    }
                                }
                            } catch (err) {}
                        }
                    }

                    if (detectedColor) {
                        return applyDetectedColor(detectedColor);
                    }
                    return false;
                } catch (e) {
                    return false;
                }
            }

            /**
             * Retry with exponential backoff for async-loaded themes
             */
            function syncNetSuiteColorWithRetry(maxRetries, initialDelay) {
                maxRetries = maxRetries || 5;
                initialDelay = initialDelay || 100;
                var attempts = 0;

                function attempt() {
                    attempts++;
                    var success = syncNetSuiteColor();

                    if (success) return;

                    if (attempts < maxRetries) {
                        var delay = initialDelay * Math.pow(2, attempts - 1);
                        setTimeout(attempt, delay);
                    } else {
                        // Apply default dark sidebar
                        applyDetectedColor('rgb(30, 41, 59)');
                    }
                }
                attempt();
            }

            /**
             * Check if color is light or grey (skip light backgrounds, we want the dark nav bar)
             * More aggressive filtering to skip the lighter top section and match the darker nav
             */
            function isLightOrGrey(color) {
                var rgb = parseRgb(color);
                if (!rgb) return false;

                var luminance = (0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b) / 255;
                var max = Math.max(rgb.r, rgb.g, rgb.b);
                var min = Math.min(rgb.r, rgb.g, rgb.b);
                var saturation = max === 0 ? 0 : (max - min) / max;

                // Skip if luminance > 0.5 (we want dark colors only, like the nav bar)
                if (luminance > 0.5) return true;

                // Skip if very unsaturated (grey)
                if (saturation < 0.1 && luminance > 0.3) return true;

                return false;
            }

            /**
             * Parse RGB color string
             */
            function parseRgb(color) {
                var rgbMatch = color.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
                if (rgbMatch) {
                    return { r: parseInt(rgbMatch[1], 10), g: parseInt(rgbMatch[2], 10), b: parseInt(rgbMatch[3], 10) };
                }
                var rgbaMatch = color.match(/rgba\((\d+),\s*(\d+),\s*(\d+),\s*[\d.]+\)/);
                if (rgbaMatch) {
                    return { r: parseInt(rgbaMatch[1], 10), g: parseInt(rgbaMatch[2], 10), b: parseInt(rgbaMatch[3], 10) };
                }
                return null;
            }

            /**
             * Get luminance (0 = black, 1 = white)
             */
            function getLuminance(rgb) {
                return (0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b) / 255;
            }

            /**
             * Adjust brightness (-1 to 1)
             */
            function adjustBrightness(rgb, amount) {
                if (amount < 0) {
                    var factor = 1 + amount;
                    return {
                        r: Math.round(Math.max(0, rgb.r * factor)),
                        g: Math.round(Math.max(0, rgb.g * factor)),
                        b: Math.round(Math.max(0, rgb.b * factor))
                    };
                } else {
                    return {
                        r: Math.round(Math.min(255, rgb.r + (255 - rgb.r) * amount)),
                        g: Math.round(Math.min(255, rgb.g + (255 - rgb.g) * amount)),
                        b: Math.round(Math.min(255, rgb.b + (255 - rgb.b) * amount))
                    };
                }
            }

            /**
             * Apply detected color to sidebar
             */
            function applyDetectedColor(color) {
                var rgb = parseRgb(color);
                if (!rgb) return false;

                var root = document.documentElement;
                var sidebar = document.querySelector('.app-sidebar');

                // Lighten detected color by 15% for sidebar
                var sidebarRgb = adjustBrightness(rgb, 0.15);
                var sidebarColor = 'rgb(' + sidebarRgb.r + ', ' + sidebarRgb.g + ', ' + sidebarRgb.b + ')';

                // Check luminance for text contrast
                var sidebarLuminance = getLuminance(sidebarRgb);
                var needsLightTheme = sidebarLuminance > 0.5;

                // Calculate hover and border colors
                var hoverRgb, borderRgb;
                if (needsLightTheme) {
                    hoverRgb = adjustBrightness(sidebarRgb, -0.08);
                    borderRgb = adjustBrightness(sidebarRgb, -0.12);
                    if (sidebar) sidebar.classList.add('light-theme');
                } else {
                    hoverRgb = adjustBrightness(sidebarRgb, 0.15);
                    borderRgb = adjustBrightness(sidebarRgb, 0.20);
                    if (sidebar) sidebar.classList.remove('light-theme');
                }

                // Apply CSS variables
                root.style.setProperty('--surface-sidebar', sidebarColor);
                root.style.setProperty('--sidebar-bg-hover', 'rgb(' + hoverRgb.r + ', ' + hoverRgb.g + ', ' + hoverRgb.b + ')');
                root.style.setProperty('--sidebar-border', 'rgb(' + borderRgb.r + ', ' + borderRgb.g + ', ' + borderRgb.b + ')');

                // Apply directly to sidebar
                if (sidebar) {
                    sidebar.style.background = sidebarColor;

                    // Reveal sidebar with animation after color is applied
                    requestAnimationFrame(function() {
                        sidebar.classList.add('sidebar-ready');
                    });
                }

                // Mark color as ready globally
                window.FC_COLOR_READY = true;

                console.log('[FC] Sidebar color synced with NetSuite navbar:', color, '->', sidebarColor);
                return true;
            }

            /**
             * Reveal sidebar (called after color detection or as fallback)
             */
            function revealSidebar() {
                var sidebar = document.querySelector('.app-sidebar');
                if (sidebar && !sidebar.classList.contains('sidebar-ready')) {
                    sidebar.classList.add('sidebar-ready');
                }
            }

            // Also listen for postMessage as fallback
            window.addEventListener('message', function(event) {
                if (event.data && event.data.type === 'FC_NAVBAR_COLOR' && event.data.color) {
                    applyDetectedColor(event.data.color);
                }
            });

            // Run color detection immediately
            syncNetSuiteColorWithRetry();

            // Safety net: reveal sidebar after max wait time even if detection fails
            setTimeout(function() {
                if (!window.FC_COLOR_READY) {
                    applyDetectedColor('rgb(30, 41, 59)'); // Default dark color
                }
                revealSidebar();
            }, 2000);
        })();
    </script>

    <!-- Config script injected here by Suitelet -->
</head>
<body>
    <div class="app-wrapper">
        <!-- SIDEBAR NAVIGATION -->
        <nav class="app-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor"/>
                    </svg>
                </div>
                <div class="sidebar-brand">
                    <span class="brand-name">Flux</span>
                    <span class="brand-tagline">Document Intelligence</span>
                </div>
            </div>

            <ul class="nav-list">
                <li class="nav-section-title">Overview</li>
                <li class="nav-item">

                                        <label for="email-address-input">Email Capture Address:</label>
                                        <div class="email-address-display">
                                            <input type="text" id="email-address-input" class="email-address-input" placeholder="emails.xxxxx.xxxx.xxxxx@xxxxx.email.netsuite.com">
                                            <button class="btn btn-primary btn-sm" id="btn-save-email-address">
                                                <i class="fas fa-save"></i> Save
                                            </button>
                                        </div>
                                        <small class="email-address-help">
                                            The address format is: emails.{accountid}.{numbers}.{hash}@{accountid}.email.netsuite.com
                                        </small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- TAB: System -->
            <div class="settings-tab-panel" id="settings-panel-system" style="display:none;">
                <div class="settings-layout">
                <!-- Help & Support -->
                <div class="settings-card">
                    <div class="settings-card-header">
                        <i class="fas fa-question-circle"></i>
                        <div>
                            <h3>Help & Support</h3>
                            <p>Resources and documentation</p>
                        </div>
                    </div>
                    <div class="settings-card-body">
                        <div class="setting-row">
                            <div class="setting-label">
                                <span>Keyboard Shortcuts</span>
                                <small>Speed up document review with keyboard navigation</small>
                            </div>
                            <div class="setting-control">
                                <button class="btn btn-ghost" id="btn-show-shortcuts">
                                    <i class="fas fa-keyboard"></i> View Shortcuts
                                </button>
                            </div>
                        </div>
                        <div class="setting-row">
                            <div class="setting-label">
                                <span>Version</span>
                                <small>Flux Capture v2.0</small>
                            </div>
                        </div>
                    </div>
                </div>
                </div>
            </div>

            <div class="settings-footer">
                <button class="btn btn-primary btn-lg" id="btn-save-settings">
                    <i class="fas fa-check"></i> Save Changes
                </button>
            </div>
        </div>
    </script>

    <!-- DOCUMENTS TEMPLATE - Inbox Zero + Command Mode -->
    <script type="text/template" id="tpl-documents">
        <div class="view-documents-inbox">
            <!-- Progress Header -->
            <div class="inbox-header">
                <div class="inbox-progress">
                    <div class="progress-left">
                        <span class="inbox-icon"><i class="fas fa-inbox"></i></span>
                        <span class="inbox-count" id="inbox-count">0</span>
                        <span class="inbox-label">to review</span>
                    </div>
                    <div class="progress-center">
                        <div class="progress-track">
                            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
                        </div>
                        <span class="progress-text" id="progress-text">0% complete today</span>
                    </div>
                    <div class="progress-right">
                        <span class="streak-badge" id="streak-badge" style="display:none;">
                            <i class="fas fa-fire"></i>
                            <span id="streak-count">0</span>
                        </span>
                    </div>
                </div>
                <div class="inbox-actions">
                    <button class="btn btn-ghost" id="btn-refresh" title="Refresh">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button class="btn btn-primary" id="btn-go-to-flow">
                        <i class="fas fa-cloud-arrow-up"></i> Upload
                    </button>
                </div>
            </div>

            <!-- Confidence Triage Tabs -->
            <div class="triage-tabs" id="triage-tabs">
                <button class="triage-tab active" data-filter="review">
                    <span class="tab-label">To Review</span>
                    <span class="tab-count" id="tab-count-review">0</span>
                </button>
                <button class="triage-tab" data-filter="high">
                    <span class="tab-dot high"></span>
                    <span class="tab-label">High</span>
                    <span class="tab-count" id="tab-count-high">0</span>
                </button>
                <button class="triage-tab" data-filter="medium">
                    <span class="tab-dot medium"></span>
                    <span class="tab-label">Medium</span>
                    <span class="tab-count" id="tab-count-medium">0</span>
                </button>
                <button class="triage-tab" data-filter="low">
                    <span class="tab-dot low"></span>
                    <span class="tab-label">Low</span>
                    <span class="tab-count" id="tab-count-low">0</span>
                </button>
                <button class="triage-tab" data-filter="flagged">
                    <i class="fas fa-flag"></i>
                    <span class="tab-label">Flagged</span>
                    <span class="tab-count" id="tab-count-flagged">0</span>
                </button>
                <div class="triage-divider"></div>
                <button class="triage-tab" data-filter="completed">
                    <span class="tab-label">Completed</span>
                    <span class="tab-count" id="tab-count-completed">0</span>
                </button>
                <button class="triage-tab" data-filter="all">
                    <span class="tab-label">All</span>
                    <span class="tab-count" id="tab-count-all">0</span>
                </button>
                <div class="triage-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="doc-search" placeholder="Search... (/)">
                </div>
            </div>

            <!-- Document List -->
            <div class="document-list" id="document-list">
                <!-- Documents render here -->
            </div>

            <!-- Inbox Zero State -->
            <div class="inbox-zero" id="inbox-zero" style="display:none;">
                <div class="inbox-zero-content">
                    <div class="inbox-zero-icon">
                        <i class="fas fa-party-horn"></i>
                    </div>
                    <h2>All Caught Up!</h2>
                    <p>You've processed all documents</p>
                    <div class="inbox-zero-stats">
                        <div class="zero-stat">
                            <span class="zero-value" id="zero-processed">0</span>
                            <span class="zero-label">Processed Today</span>
                        </div>
                        <div class="zero-stat">
                            <span class="zero-value" id="zero-accuracy">0%</span>
                            <span class="zero-label">Avg Confidence</span>
                        </div>
                        <div class="zero-stat">
                            <span class="zero-value" id="zero-streak">0</span>
                            <span class="zero-label">Best Streak</span>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-lg" id="btn-upload-from-zero">
                        <i class="fas fa-cloud-arrow-up"></i> Upload More Documents
                    </button>
                </div>
            </div>

            <!-- Keyboard HUD (hidden until hover near bottom) -->
            <div class="keyboard-hover-zone docs-keyboard-hover"></div>
            <div class="keyboard-hud docs-keyboard-hud" id="keyboard-hud">
                <div class="hud-item"><kbd>J</kbd><kbd>K</kbd><span>Nav</span></div>
                <div class="hud-item"><kbd>⏎</kbd><span>Open</span></div>
                <div class="hud-item"><kbd>A</kbd><span>Approve</span></div>
                <div class="hud-item"><kbd>D</kbd><span>Delete</span></div>
                <div class="hud-item"><kbd>Space</kbd><span>Select</span></div>
                <div class="hud-item"><kbd>⌘K</kbd><span>Commands</span></div>
                <div class="hud-item"><kbd>?</kbd><span>Help</span></div>
            </div>

            <!-- Command Palette (hidden by default) -->
            <div class="command-palette" id="command-palette" style="display:none;">
                <div class="palette-overlay"></div>
                <div class="palette-modal">
                    <div class="palette-input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="palette-input" placeholder="Type a command..." autofocus>
                    </div>
                    <div class="palette-results" id="palette-results">
                        <!-- Commands render here -->
                    </div>
                </div>
            </div>

            <!-- Confetti container for celebrations -->
            <div class="confetti-container" id="confetti-container"></div>
        </div>
    </script>

    <!-- ============================================
         JAVASCRIPT - Order matters!
         ============================================ -->
    <!-- 0. Debug utility (must load before all other scripts) -->
    <script src="{{JS_DEBUG_URL}}"></script>
    <!-- 1. Core framework first -->
    <script src="{{JS_CORE_URL}}"></script>
    <!-- 2. Main app setup -->
    <script src="{{JS_MAIN_URL}}"></script>
    <!-- 3. View controllers -->
    <script src="{{JS_VIEW_DASHBOARD_URL}}"></script>
    <script src="{{JS_VIEW_QUEUE_URL}}"></script>
    <script src="{{JS_VIEW_REVIEW_URL}}"></script>
    <script src="{{JS_VIEW_RAIL_URL}}"></script>
    <script src="{{JS_VIEW_SETTINGS_URL}}"></script>
    <script src="{{JS_VIEW_DOCUMENTS_URL}}"></script>
</body>
</html>
